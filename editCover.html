<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Cover</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <nav class="navbar">
      <div class="nav-left">
        <a href="index.html" class="logo">
          <span class="logo-main">What If</span>
          <span class="logo-sub">multiverse</span>
        </a>
      </div>
      <div class="nav-right" id="nav-auth"></div>
    </nav>
  </header>

  <section class="story-view">
    <h1>Edit Cover Image</h1>

    <form id="edit-cover-form">
  <label>Cover URL</label>
  <input id="cover_url" type="text" readonly>

  <input type="file" id="coverFile" accept= "image/png, image/jpeg" style="display: none;">
  
  <label for="coverFile" class="button">Choose File</label>
  <span id="fileNameDisplay" style="margin-left: 10px; color: #666;">No file chosen</span>

  <button id="uploadCoverBtn" type="button" class="button">Upload to Supabase</button>
  <p id="uploadStatus"></p>
</form>
    <p id="status"></p>
  </section>

  <script type="module" src="js/navbar.js"></script>
<script type="module" src="js/editCover.js"></script>
</body>
</html>
